<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camdeck</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>Camdeck</h1>

    <input id="roomId" placeholder="Room code" />
    <div class="buttons">
      <button id="startCamera">Use this tablet as camera</button>
      <button id="startViewer">View cameras</button>
    </div>

    <video id="localVideo" autoplay playsinline muted></video>
    <div id="remoteVideos"></div>

<button onclick="document.querySelectorAll('video').forEach(v => v.play())">
  Tap if video doesn't play
</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
