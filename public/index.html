<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoziKamera Security</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <main class="app-shell">
    <div class="dashboard-frame">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Secure camera network</p>
          <h1>KoziKamera Security</h1>
        </div>
      </header>

      <section id="homeScreen" class="screen active glass-panel">
        <h2 class="panel-title">Access Gateway</h2>
        <p class="panel-text">Enter your secure room key to continue.</p>

        <div class="form-grid">
          <label for="roomId">Access key</label>
          <input id="roomId" type="password" placeholder="Access key" inputmode="text" />

          <label for="cameraName">Camera name</label>
          <input id="cameraName" placeholder="Camera name (optional)" maxlength="24" />

          <label for="cameraSelect">Camera device</label>
          <select id="cameraSelect"></select>
        </div>

        <div class="control-row">
          <button id="connectRoom">Authorize &amp; Connect</button>
          <button id="rejoinLast" class="secondary">Rejoin last session</button>
        </div>
      </section>

      <section id="roleScreen" class="screen glass-panel">
        <h2 class="panel-title">Connection Established</h2>
        <div class="control-row">
          <button id="startCamera">Deploy as camera</button>
          <button id="startViewer">View camera feeds</button>
          <button id="changeRoom" class="secondary">Change room</button>
        </div>
      </section>

      <section id="liveScreen" class="screen glass-panel live-panel">
        <section class="live-section live-header">
          <div class="live-top-row">
            <div class="control-row dense">
              <button id="toggleMute" class="secondary">Mute</button>
              <button id="toggleCamera" class="secondary">Camera off</button>
              <button id="startRecording" class="record">Start Recording</button>
              <button id="stopRecording" class="stop">Stop Recording</button>
              <button id="toggleMotionFollow" class="secondary">Motion follow: Off</button>
              <button id="toggleLayout" class="secondary">Focus layout</button>
              <button id="disconnectRoom" class="danger">Disconnect</button>
            </div>
          </div>
        </section>

        <section class="live-section live-status-controls">
          <div class="status-row">
            <div id="statusMessage" class="status-text" role="status" aria-live="polite"></div>
            <div id="connectionBadge" class="connection-badge">Connecting…</div>
          </div>
          <button id="retryPlayback" class="secondary retry-btn">Tap if video doesn't play</button>
        </section>

        <section class="live-section live-grid-section">
          <p id="emptyState" class="empty-state">No cameras connected – deploy a camera.</p>
          <div id="remoteVideos" class="feed-grid mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"></div>
        </section>

        <section id="timelinePanel" class="timeline-panel live-section" aria-live="polite">
          <h2 class="panel-title">Session timeline</h2>
          <ul id="sessionTimeline"></ul>
        </section>
      </section>
    </div>
  </main>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="false"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
